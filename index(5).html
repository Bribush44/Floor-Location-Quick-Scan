<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#102033" />
  <title>FG Location Barcode Finder</title>
  <style>
:root {
  --bg1: #08111f;
  --bg2: #102033;
  --card: rgba(255,255,255,0.96);
  --text: #102033;
  --muted: #64748b;
  --line: #dbe4ef;
  --accent: #ffb020;
  --accent2: #22c55e;
  --blue: #2563eb;
  --danger: #ef4444;
}

* { box-sizing: border-box; }

html, body {
  min-height: 100%;
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 15% 0%, rgba(255,176,32,0.22), transparent 28rem),
    radial-gradient(circle at 90% 10%, rgba(37,99,235,0.25), transparent 24rem),
    linear-gradient(160deg, var(--bg1), var(--bg2));
  color: white;
}

button, input { font: inherit; }

button {
  border: 0;
  border-radius: 16px;
  padding: 0.9rem 1rem;
  font-weight: 900;
  cursor: pointer;
  background: var(--accent);
  color: #111827;
  box-shadow: 0 12px 28px rgba(0,0,0,0.22);
}

button:active { transform: translateY(1px); }

.hidden { display: none !important; }

#app {
  width: min(820px, 100%);
  margin: 0 auto;
  padding: 1rem;
  padding-bottom: calc(1rem + env(safe-area-inset-bottom));
}

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem 0.25rem 1.2rem;
}

.brand-row {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}

.logo-card {
  width: 190px;
  min-height: 78px;
  flex: 0 0 190px;
  border-radius: 22px;
  display: grid;
  place-items: center;
  background: #ffffff;
  border: 3px solid rgba(255,255,255,0.45);
  box-shadow: 0 18px 35px rgba(0,0,0,0.28);
  padding: 0.55rem;
}

.logo-card img {
  display: block;
  width: 100%;
  height: auto;
}

.eyebrow {
  margin: 0 0 0.2rem;
  color: var(--accent);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 1000;
}

h1 {
  margin: 0;
  font-size: clamp(1.85rem, 8vw, 3.25rem);
  line-height: 0.95;
  letter-spacing: -0.06em;
}

.subtitle {
  margin: 0.35rem 0 0;
  color: #d7e1ee;
  font-weight: 750;
}

.view { display: none; }
.view.active { display: block; }

.panel, .barcode-panel {
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.55);
  border-radius: 28px;
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: 0 22px 50px rgba(0,0,0,0.26);
  backdrop-filter: blur(12px);
}

.search-panel label {
  display: block;
  font-size: 1.05rem;
  font-weight: 1000;
  margin-bottom: 0.65rem;
}

.search-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 0.55rem;
}

input[type="search"] {
  width: 100%;
  border: 3px solid var(--line);
  border-radius: 18px;
  padding: 1rem;
  font-size: 1.2rem;
  font-weight: 1000;
  text-transform: uppercase;
  outline: none;
  background: white;
  color: var(--text);
}

input[type="search"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 5px rgba(255,176,32,0.22);
}

.icon-btn {
  min-width: 58px;
  font-size: 1.25rem;
}

.secondary {
  background: rgba(255,255,255,0.16);
  color: white;
  border: 1px solid rgba(255,255,255,0.28);
  box-shadow: none;
}

.secondary.dark {
  background: #e2e8f0;
  color: #102033;
  border: 0;
}

.status {
  min-height: 1.25rem;
  color: var(--muted);
  font-weight: 750;
  margin: 0.65rem 0 0;
}

.section-title {
  font-size: 0.85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 1000;
  margin-bottom: 0.85rem;
}

.row-between {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.count {
  color: var(--blue);
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
  gap: 0.7rem;
}

.result {
  min-height: 74px;
  text-align: left;
  background: #f8fafc;
  color: var(--text);
  border: 2px solid var(--line);
  box-shadow: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.15rem;
}

.result strong {
  font-size: 1.3rem;
  letter-spacing: 0.02em;
}

.result small {
  color: var(--muted);
  font-weight: 800;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
}

.chips .result {
  width: auto;
  min-height: auto;
  padding: 0.75rem 0.95rem;
}

.back {
  margin-bottom: 1rem;
  background: rgba(255,255,255,0.16);
  color: white;
  border: 1px solid rgba(255,255,255,0.28);
  box-shadow: none;
}

.barcode-panel {
  min-height: 72vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.scan-label {
  width: max-content;
  margin: 0 auto 0.8rem;
  background: #dcfce7;
  color: #166534;
  padding: 0.45rem 0.8rem;
  border-radius: 999px;
  font-weight: 1000;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.78rem;
}

.location-line {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.8rem;
}

.location-line h2 {
  margin: 0;
  font-size: clamp(3rem, 16vw, 7rem);
  line-height: 1;
  letter-spacing: -0.04em;
}

.favorite {
  background: #eef2f7;
  color: var(--text);
  box-shadow: none;
  font-size: 2.1rem;
  padding: 0.45rem 0.75rem;
}

.favorite.active {
  background: #fef3c7;
  color: #b45309;
}

.barcode-wrap {
  margin-top: 1rem;
  width: 100%;
  background: white;
  border: 5px solid #0f172a;
  border-radius: 22px;
  padding: 1.15rem 0.5rem;
  overflow: hidden;
}

#barcode {
  width: 100%;
  max-height: 290px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 1rem;
}

.hint {
  color: var(--muted);
  text-align: center;
  font-weight: 800;
  margin: 1rem 0 0;
}

.fullscreen-mode {
  background: white !important;
}

.fullscreen-mode #app {
  width: 100%;
  max-width: none;
  padding: 0;
}

.fullscreen-mode .hero,
.fullscreen-mode #searchView,
.fullscreen-mode #backBtn,
.fullscreen-mode .actions,
.fullscreen-mode .hint,
.fullscreen-mode .scan-label {
  display: none !important;
}

.fullscreen-mode #barcodeView {
  display: flex !important;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  background: white;
}

.fullscreen-mode .barcode-panel {
  box-shadow: none;
  border: 0;
  border-radius: 0;
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 1rem;
}

.fullscreen-mode .barcode-wrap {
  border: 0;
  padding: 0;
}

.fullscreen-mode #barcode {
  max-height: 64vh;
}

@media (max-width: 520px) {
  #app { padding: 0.75rem; }

  .hero {
    align-items: flex-start;
  }

  .brand-row {
    align-items: flex-start;
  }

  .logo-card {
    width: 138px;
    min-height: 58px;
    flex-basis: 138px;
    border-radius: 16px;
  }

  .search-row {
    grid-template-columns: 1fr auto;
  }

  #clearBtn {
    grid-column: 1 / -1;
  }

  .result-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .actions {
    grid-template-columns: 1fr;
  }
}

</style>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="bg-glow"></div>

  <div id="app">
    <header class="hero">
      <div class="brand-row">
        <div class="logo-card">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" role="img" aria-label="Bridgetown Natural Foods logo">
  <defs>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7bb342"/>
      <stop offset="100%" stop-color="#2f7d32"/>
    </linearGradient>
  </defs>
  <rect width="900" height="250" fill="none"/>
  <g transform="translate(26,28)">
    <path d="M80 120 C58 72 86 30 150 12 C169 63 154 109 107 137 C99 121 91 111 80 120Z" fill="url(#leaf)"/>
    <path d="M98 133 C134 91 169 57 210 36" fill="none" stroke="#2f7d32" stroke-width="11" stroke-linecap="round"/>
    <path d="M56 143 C84 116 117 115 146 143 C115 170 83 170 56 143Z" fill="#75a843"/>
    <path d="M143 151 C179 120 219 122 253 153 C214 186 176 184 143 151Z" fill="#9fbf3b"/>
    <path d="M40 191 C94 165 168 160 242 183" fill="none" stroke="#7b5a2f" stroke-width="12" stroke-linecap="round"/>
  </g>
  <text x="322" y="103" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="#223047">Bridgetown</text>
  <text x="325" y="158" font-family="Arial, Helvetica, sans-serif" font-size="37" font-weight="700" letter-spacing="5" fill="#477832">NATURAL FOODS</text>
  <path d="M326 176 H782" stroke="#d4aa3f" stroke-width="5" stroke-linecap="round"/>
</svg>
        </div>
        <div>
          <p class="eyebrow">Warehouse Scanner Tool</p>
          <h1>FG Location Finder</h1>
          <p class="subtitle">Find the location. Open the barcode. Scan fast.</p>
        </div>
      </div>
      <button id="installBtn" class="secondary hidden" type="button">Install App</button>
    </header>

    <main id="searchView" class="view active">
      <section class="panel search-panel">
        <label for="searchInput">Search Location</label>
        <div class="search-row">
          <input id="searchInput" type="search" autocomplete="off" spellcheck="false"
                 placeholder="FG01, FG10, FGSTG..." autofocus />
          <button id="micBtn" class="icon-btn" type="button" title="Voice search">🎤</button>
          <button id="clearBtn" class="secondary" type="button">Clear</button>
        </div>
        <p id="voiceStatus" class="status">Tip: tap the microphone and say “F G zero one” or “F G staging.”</p>
      </section>

      <section id="favoritesSection" class="panel hidden">
        <div class="section-title">Favorites</div>
        <div id="favoritesList" class="chips"></div>
      </section>

      <section id="recentSection" class="panel hidden">
        <div class="section-title">Recent</div>
        <div id="recentList" class="chips"></div>
      </section>

      <section class="panel">
        <div class="section-title row-between">
          <span>Results</span>
          <span id="resultCount" class="count"></span>
        </div>
        <div id="resultsList" class="result-grid"></div>
      </section>
    </main>

    <main id="barcodeView" class="view">
      <button id="backBtn" class="back" type="button">← Back to Search</button>

      <section class="barcode-panel">
        <div class="scan-label">Ready to Scan</div>

        <div class="location-line">
          <h2 id="selectedLocation">FG01</h2>
          <button id="favoriteBtn" class="favorite" type="button" title="Favorite">☆</button>
        </div>

        <div id="barcodeWrap" class="barcode-wrap">
          <svg id="barcode"></svg>
        </div>

        <div class="actions">
          <button id="fullScreenBtn" type="button">Full Screen Barcode</button>
          <button id="copyBtn" class="secondary dark" type="button">Copy Code</button>
        </div>

        <p class="hint">For best scanner results, turn phone brightness up and keep the phone steady.</p>
      </section>
    </main>
  </div>

  <script>
const state = {
  locations: [],
  filtered: [],
  selected: null,
  wakeLock: null,
  deferredPrompt: null,
};

const els = {
  searchView: document.getElementById("searchView"),
  barcodeView: document.getElementById("barcodeView"),
  searchInput: document.getElementById("searchInput"),
  micBtn: document.getElementById("micBtn"),
  clearBtn: document.getElementById("clearBtn"),
  voiceStatus: document.getElementById("voiceStatus"),
  resultsList: document.getElementById("resultsList"),
  resultCount: document.getElementById("resultCount"),
  favoritesSection: document.getElementById("favoritesSection"),
  favoritesList: document.getElementById("favoritesList"),
  recentSection: document.getElementById("recentSection"),
  recentList: document.getElementById("recentList"),
  backBtn: document.getElementById("backBtn"),
  selectedLocation: document.getElementById("selectedLocation"),
  barcode: document.getElementById("barcode"),
  favoriteBtn: document.getElementById("favoriteBtn"),
  fullScreenBtn: document.getElementById("fullScreenBtn"),
  copyBtn: document.getElementById("copyBtn"),
  installBtn: document.getElementById("installBtn"),
};

const WORD_NUMBERS = {
  "zero": "0", "oh": "0", "o": "0",
  "one": "1", "won": "1",
  "two": "2", "too": "2", "to": "2",
  "three": "3",
  "four": "4", "for": "4",
  "five": "5",
  "six": "6",
  "seven": "7",
  "eight": "8", "ate": "8",
  "nine": "9",
  "ten": "10",
  "eleven": "11",
  "twelve": "12",
  "thirteen": "13",
  "fourteen": "14",
  "fifteen": "15",
  "sixteen": "16",
  "seventeen": "17",
  "eighteen": "18",
  "nineteen": "19",
  "twenty": "20",
  "thirty": "30",
  "staging": "STG",
  "stage": "STG"
};

function normalize(value) {
  return String(value || "")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, "");
}

function normalizeSpeech(value) {
  let text = String(value || "").toLowerCase();
  text = text.replace(/dash|hyphen|minus/g, " ");
  return text
    .split(/\s+/)
    .map(part => WORD_NUMBERS[part] ?? part)
    .join("")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, "");
}

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function setFavorites(list) {
  localStorage.setItem("favorites", JSON.stringify([...new Set(list)].slice(0, 50)));
}

function getRecents() {
  return JSON.parse(localStorage.getItem("recents") || "[]");
}

function setRecents(list) {
  localStorage.setItem("recents", JSON.stringify([...new Set(list)].slice(0, 12)));
}

async function loadLocations() {
  state.locations = ["FG01", "FG02", "FG03", "FG04", "FG05", "FG06", "FG07", "FG08", "FG09", "FG10", "FG11", "FG12", "FG13", "FG14", "FG15", "FG16", "FG17", "FG18", "FG19", "FG20", "FG21", "FG22", "FG23", "FG24", "FG25", "FG26", "FG27", "FG28", "FG29", "FG30", "FGSTG"]
    .map(item => item.trim().toUpperCase())
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

  runSearch("");
  renderFavorites();
  renderRecents();
}

function runSearch(rawQuery) {
  const query = normalize(rawQuery);
  const speechQuery = normalizeSpeech(rawQuery);

  let results = state.locations;
  if (query || speechQuery) {
    results = state.locations.filter(loc => {
      const n = normalize(loc);
      return n.includes(query) || n.includes(speechQuery);
    });
  }

  state.filtered = results;
  renderResults();
}

function renderResults() {
  els.resultsList.innerHTML = "";
  els.resultCount.textContent = `${state.filtered.length}`;

  if (!state.filtered.length) {
    const empty = document.createElement("p");
    empty.className = "status";
    empty.textContent = "No matching locations found.";
    els.resultsList.appendChild(empty);
    return;
  }

  state.filtered.forEach(location => {
    els.resultsList.appendChild(resultButton(location));
  });
}

function resultButton(location) {
  const btn = document.createElement("button");
  btn.className = "result";
  btn.type = "button";
  btn.innerHTML = `<strong>${escapeHtml(location)}</strong><small>Tap to scan</small>`;
  btn.addEventListener("click", () => openBarcode(location));
  return btn;
}

function renderFavorites() {
  const favorites = getFavorites().filter(loc => state.locations.includes(loc));
  els.favoritesList.innerHTML = "";
  els.favoritesSection.classList.toggle("hidden", favorites.length === 0);
  favorites.forEach(location => els.favoritesList.appendChild(resultButton(location)));
}

function renderRecents() {
  const recents = getRecents().filter(loc => state.locations.includes(loc));
  els.recentList.innerHTML = "";
  els.recentSection.classList.toggle("hidden", recents.length === 0);
  recents.forEach(location => els.recentList.appendChild(resultButton(location)));
}

function openBarcode(location) {
  state.selected = location;
  els.searchView.classList.remove("active");
  els.barcodeView.classList.add("active");
  els.selectedLocation.textContent = location;

  const recents = getRecents().filter(item => item !== location);
  setRecents([location, ...recents]);
  renderRecents();

  drawBarcode(location);
  updateFavoriteButton();
  requestWakeLock();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function drawBarcode(location) {
  if (!window.JsBarcode) {
    alert("Barcode library did not load. Check your internet connection and refresh.");
    return;
  }

  JsBarcode(els.barcode, location, {
    format: "CODE39",
    lineColor: "#000000",
    background: "#ffffff",
    width: 3,
    height: 180,
    displayValue: true,
    fontSize: 36,
    fontOptions: "bold",
    margin: 10
  });
}

function closeBarcode() {
  document.body.classList.remove("fullscreen-mode");
  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
  els.barcodeView.classList.remove("active");
  els.searchView.classList.add("active");
  releaseWakeLock();
  els.searchInput.focus();
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      state.wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (err) {}
}

async function releaseWakeLock() {
  try {
    if (state.wakeLock) {
      await state.wakeLock.release();
      state.wakeLock = null;
    }
  } catch (err) {}
}

function updateFavoriteButton() {
  const favorites = getFavorites();
  const active = favorites.includes(state.selected);
  els.favoriteBtn.textContent = active ? "★" : "☆";
  els.favoriteBtn.classList.toggle("active", active);
}

function toggleFavorite() {
  if (!state.selected) return;
  const favorites = getFavorites();
  const exists = favorites.includes(state.selected);
  const next = exists
    ? favorites.filter(item => item !== state.selected)
    : [state.selected, ...favorites];
  setFavorites(next);
  updateFavoriteButton();
  renderFavorites();
}

function startVoiceSearch() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    els.voiceStatus.textContent = "Voice search is not supported in this browser.";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  els.voiceStatus.textContent = "Listening…";
  els.micBtn.textContent = "🔴";

  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript;
    const normalized = normalizeSpeech(spoken);
    els.searchInput.value = normalized;
    els.voiceStatus.textContent = `Heard: ${spoken}`;
    runSearch(normalized);
  };

  recognition.onerror = () => {
    els.voiceStatus.textContent = "Voice search stopped. Try again or type the code.";
  };

  recognition.onend = () => {
    els.micBtn.textContent = "🎤";
  };

  recognition.start();
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

els.searchInput.addEventListener("input", event => runSearch(event.target.value));
els.clearBtn.addEventListener("click", () => {
  els.searchInput.value = "";
  els.voiceStatus.textContent = 'Tip: tap the microphone and say “F G zero one” or “F G staging.”';
  runSearch("");
  els.searchInput.focus();
});

els.micBtn.addEventListener("click", startVoiceSearch);
els.backBtn.addEventListener("click", closeBarcode);
els.favoriteBtn.addEventListener("click", toggleFavorite);
els.copyBtn.addEventListener("click", async () => {
  if (!state.selected) return;
  await navigator.clipboard.writeText(state.selected).catch(() => {});
});

els.fullScreenBtn.addEventListener("click", async () => {
  document.body.classList.add("fullscreen-mode");
  try {
    await document.documentElement.requestFullscreen();
  } catch (err) {}
});

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove("fullscreen-mode");
  }
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && els.barcodeView.classList.contains("active")) {
    requestWakeLock();
  }
});

window.addEventListener("beforeinstallprompt", event => {
  event.preventDefault();
  state.deferredPrompt = event;
  els.installBtn.classList.remove("hidden");
});

els.installBtn.addEventListener("click", async () => {
  if (!state.deferredPrompt) return;
  state.deferredPrompt.prompt();
  await state.deferredPrompt.userChoice;
  state.deferredPrompt = null;
  els.installBtn.classList.add("hidden");
});

loadLocations();

</script>
</body>
</html>
